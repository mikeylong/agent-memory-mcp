name: Retrieval Regression

on:
  push:
  pull_request:

jobs:
  retrieval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run retrieval regression suite
        run: npm run test:retrieval
